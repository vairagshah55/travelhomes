[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"


[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "https://travel-b.erpbuz.com/api/:splat"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
